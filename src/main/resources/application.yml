spring:
  application:
    name: commerce

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            scope:
              - email
              - profile

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  config:
    import:
      - classpath:/yml/application-local.yml
  profiles:
    group:
      local: local

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 1800000
    refresh-token-expiry: 1209600000

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    org.springframework.web: INFO
    root: INFO
    com.mist.commerce: DEBUG
    org.hibernate.SQL: DEBUG
